<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300">
  <text x="20" y="30" font-family="Arial" font-size="16" font-weight="bold">System Architecture</text>
  <rect x="50" y="60" width="150" height="80" fill="#cfe2f3" stroke="#0b5394"/>
  <text x="70" y="100" font-family="Arial" font-size="12">User Interface</text>
  <rect x="250" y="60" width="150" height="80" fill="#d9ead3" stroke="#38761d"/>
  <text x="270" y="100" font-family="Arial" font-size="12">FastAPI App</text>
  <rect x="450" y="30" width="120" height="60" fill="#fce5cd" stroke="#b45f06"/>
  <text x="470" y="60" font-family="Arial" font-size="12">Vector DB</text>
  <rect x="450" y="140" width="120" height="60" fill="#f9cb9c" stroke="#b45f06"/>
  <text x="470" y="170" font-family="Arial" font-size="12">LLM/API</text>
  <line x1="200" y1="100" x2="250" y2="100" stroke="#000" marker-end="url(#arrow)"/>
  <line x1="400" y1="100" x2="450" y2="60" stroke="#000" marker-end="url(#arrow)"/>
  <line x1="400" y1="100" x2="450" y2="170" stroke="#000" marker-end="url(#arrow)"/>
  <line x1="450" y1="90" x2="400" y2="100" stroke="#000" marker-end="url(#arrow)"/>
  <line x1="450" y1="170" x2="400" y2="100" stroke="#000" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000"/>
    </marker>
  </defs>
</svg>
